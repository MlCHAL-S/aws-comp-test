<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analyzer</title>
    <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <h3 class="text-center">Sentiment Analyzer</h3>

                    <!-- Display error message if no text is provided -->
                    {% if error %}
                        <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}

                    <!-- Display sentiment result if available -->
                    {% if sentiment %}
                        <div class="alert alert-info">
                            Sentiment: <strong>{{ sentiment }}</strong>
                        </div>
                    {% endif %}

                    <!-- Form for text input -->
                    <form method="POST">
                        <div class="form-group">
                            <label for="text">Enter text:</label>
                            <textarea class="form-control" name="text" id="text" rows="4" required>{{ text or '' }}</textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block">Analyze</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
